<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>For You</title>

    <style>
        :root {
            --bg: #05060a;
            --cyan: #00e5ff;
            --pink: #ff4da6;
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            background: radial-gradient(circle at 20% 20%, #0a0f1a, var(--bg));
            font-family: monospace;
            text-align: center;
            overflow: hidden;
            color: var(--cyan);
        }

        /* screens */
        .screen {
            display: none;
            height: 100vh;
            width: 100vw;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }

        .active {
            display: flex
        }

        .glow {
            text-shadow: 0 0 10px var(--cyan), 0 0 20px var(--pink);
        }

        /* buttons */
        button {
            padding: 12px 22px;
            margin: 12px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 12px;
            color: black;
            background: linear-gradient(135deg, var(--cyan), var(--pink));
            box-shadow: 0 0 12px var(--cyan), 0 0 20px var(--pink);
            transition: .15s;
        }

        button:hover {
            transform: scale(1.07)
        }

        /* input */
        input {
            padding: 12px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            outline: none;
            text-align: center;
            background: #111;
            color: white;
            box-shadow: 0 0 10px var(--cyan);
        }

        /* hearts */
        .heart {
            position: absolute;
            pointer-events: none;
            animation: float 5s linear infinite;
        }

        @keyframes float {
            from {
                transform: translateY(100vh);
                opacity: 1
            }

            to {
                transform: translateY(-10vh);
                opacity: 0
            }
        }

        /* FOUND animation */
        .found {
            font-size: 40px;
            color: var(--pink);
            text-shadow: 0 0 15px var(--pink), 0 0 25px var(--cyan);
            animation: pop .5s ease;
        }

        @keyframes pop {
            0% {
                transform: scale(0.5);
                opacity: 0
            }

            100% {
                transform: scale(1);
                opacity: 1
            }
        }
    </style>
</head>

<body>

    <!-- START -->
    <div id="start" class="screen active">
        <h1 class="glow">Are you interested? </h1>
        <button onclick="go('pass')">مهتمة</button>
        <button id="noBtn">مش مهتمة</button>
    </div>

    <!-- PASSWORD -->
    <div id="pass" class="screen">
        <h2 class="glow">Prove it </h2>

        <input id="password" type="password" placeholder="Enter password">
        <button onclick="checkPass()">Enter</button>
        <p id="error" style="color:var(--pink)"></p>
    </div>

    <!-- SEARCH -->
    <div id="search" class="screen">
        <h2 id="searchText" class="glow">Searching for my best person...</h2>
    </div>

    <!-- FINAL -->
    <div id="final" class="screen">
        <h1 id="result" class="glow"></h1>
    </div>

    <!-- sound -->
    <audio id="clickSound">
        <source src="https://assets.mixkit.co/sfx/preview/mixkit-select-click-1109.mp3">
    </audio>

    <script>

        function playClick() {
            let s = document.getElementById("clickSound");
            s.currentTime = 0;
            s.play();
        }

        function go(id) {
            playClick();
            document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
            document.getElementById(id).classList.add("active");
        }

        /* running button */
        let noBtn = document.getElementById("noBtn");
        noBtn.onmouseover = function () {
            playClick();
            noBtn.style.position = "absolute";
            noBtn.style.top = Math.random() * 80 + "vh";
            noBtn.style.left = Math.random() * 80 + "vw";
        }

        /* password */
        function checkPass() {
            playClick();
            let val = document.getElementById("password").value;

            if (val === "522025") {
                go("search");

                setTimeout(() => {
                    document.getElementById("searchText").innerHTML =
                        "<span class='found'>FOUND!</span>";

                    setTimeout(() => {
                        go("final");
                        document.getElementById("result").innerText = "It’s Taqwaa ♥️♥️";
                        hearts();
                    }, 1000);

                }, 5000);

            } else {
                document.getElementById("error").innerText = "Wrong";
            }
        }

        /* hearts */
        function hearts() {
            for (let i = 0; i < 60; i++) {
                let h = document.createElement("div");
                h.className = "heart";
                h.innerText = "♥";
                h.style.left = Math.random() * 100 + "vw";
                h.style.fontSize = (18 + Math.random() * 30) + "px";
                h.style.color = Math.random() > 0.5 ? "#00e5ff" : "#ff4da6";
                document.body.appendChild(h);
            }
        }

    </script>

</body>

</html>
